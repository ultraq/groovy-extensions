plugins {
	id 'groovy'
	id 'jacoco'
	id 'maven-publish'
	id 'idea'
	id 'nz.net.ultraq.gradle.use-maven-central-repositories' version '5.0.0-SNAPSHOT'
	id 'nz.net.ultraq.gradle.single-source-directory' version '5.0.0-SNAPSHOT'
	id 'nz.net.ultraq.gradle.groovy-support' version '5.0.0-SNAPSHOT'
//	id 'nz.net.ultraq.gradle.development-plugin' version '5.0.0-SNAPSHOT'
}

description = 'A collection of extensions for Groovy projects that I almost wish were a part of the GDK'
version = '3.0.0-SNAPSHOT'
group = 'nz.net.ultraq.groovy'

sourceSets {
	main {
		withSingleSourceDirectory('source')
	}
	test {
		withSingleSourceDirectory('test')
	}
}

dependencies {
	implementation 'org.apache.groovy:groovy:4.0.27'

	testImplementation 'net.bytebuddy:byte-buddy:1.14.18'
	testImplementation 'org.objenesis:objenesis:3.4'
	testImplementation 'org.spockframework:spock-core:2.3-groovy-4.0'
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
		vendor = JvmVendorSpec.ADOPTIUM
	}
	withJavadocJar()
	withSourcesJar()
}

groovy {
	expandExtensionModuleVersion()
	withGroovydocJar()
}

testing {
	suites {
		test {
			useJUnitJupiter()
		}
	}
}

jar {
	manifest {
		attributes('Automatic-Module-Name': 'nz.net.ultraq.groovy.extensions')
	}
}
